# Custom ByteTrack configuration
# Tuned for yolov8s at 640px; works at both low FPS (5-10) and high FPS (25+)

tracker_type: bytetrack

# Detection confidence gate for "high-confidence" tracks
track_high_thresh: 0.30

# Minimum confidence to initialise a brand-new track
new_track_thresh: 0.25

# IOU match threshold for re-associating detections to existing tracks.
# 0.85 was too strict at low FPS — fast-moving vehicles shift far between
# frames, their IoU with the previous box drops below 0.85, and ByteTrack
# creates a new ID instead of continuing the track (ID flicker).
# 0.50 tolerates ~50% positional shift while still blocking cross-object swaps.
match_thresh: 0.50

# Frames a lost track survives before being deleted.
# 30 frames @ 5 FPS = 6 s; 30 frames @ 25 FPS = 1.2 s — a reasonable window
# without accumulating too many zombie tracks that pollute association.
track_buffer: 30

# Low-confidence detections still considered for second-round matching
track_low_thresh: 0.1

# Minimum box side length in pixels (ignore tiny detections)
min_box_area: 10

# Use Gaussian motion model (smoother centroid predictions)
fuse_score: true