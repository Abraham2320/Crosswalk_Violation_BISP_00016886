version: "3.9"

services:
  api:
    build: .
    container_name: crosswalk-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://crosswalk:crosswalk@db:5432/crosswalk
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: crosswalk-db
    environment:
      POSTGRES_DB: crosswalk
      POSTGRES_USER: crosswalk
      POSTGRES_PASSWORD: crosswalk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
