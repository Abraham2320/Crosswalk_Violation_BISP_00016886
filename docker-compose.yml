version: "3.9"

services:
  # ── Flask admin panel + live stream ───────────────────────────────────────
  web:
    build: .
    image: crosswalk-enforcement
    container_name: crosswalk_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist DB, polygon, snapshots and artifacts across restarts
      - ./crosswalk_violations.db:/app/crosswalk_violations.db
      - ./crosswalk_polygon.json:/app/crosswalk_polygon.json
      - ./static/snapshots:/app/static/snapshots
      - ./artifacts:/app/artifacts
    env_file:
      - .env
    environment:
      FLASK_ENV: production
    # Uncomment for USB webcam access inside the container (Linux only):
    # devices:
    #   - /dev/video0:/dev/video0

  # ── Streamlit analytics dashboard ─────────────────────────────────────────
  dashboard:
    build: .
    image: crosswalk-enforcement
    container_name: crosswalk_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./crosswalk_violations.db:/app/crosswalk_violations.db
    env_file:
      - .env
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    depends_on:
      - web
